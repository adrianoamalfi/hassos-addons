# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: Duplicati add-on
version: "1.1.0"
slug: duplicati
description: Store securely encrypted backups on cloud storage services!
url: "https://github.com/adrianoamalfi/hassos-addons/tree/main/duplicati"
arch:
  - aarch64
  - amd64
ingress: true
ingress_port: 8080
homeassistant_api: true
panel_icon: mdi:backup-restore
startup: services
init: false
options:
  default_ui: ngclient
  log_level: information
schema:
  default_ui: "list(ngclient|ngax)"
  log_level: "list(verbose|debug|information|warning|error)"
backup_exclude: ["/backup"]
privileged:
  - DAC_READ_SEARCH
map:
  - config:rw
  - ssl:rw
  - media:rw
  - addons:rw
  - share:rw
  - backup:rw
image: "ghcr.io/adrianoamalfi/{arch}-addon-duplicati"
