name: Lint

on:
  push:
    branches:
      - main
    paths:
      - "duplicati/**"
  pull_request:
    branches:
      - main
    paths:
      - "duplicati/**"
  schedule:
    - cron: "0 0 * * *"

jobs:
  lint:
    name: Lint duplicati add-on
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@v6.0.2

      - name: Run Home Assistant Add-on Lint
        uses: frenck/action-addon-linter@v2.21.0
        with:
          path: "./duplicati"
